<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TDEE 計算器</title>
  <style>
    body {
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
      font-family: "Segoe UI", sans-serif;
      background-image: url(b.png);
      color: #333;
    }

    header {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(5px);
      height: 70px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      background: url(F.png) no-repeat center;
      background-size: contain;
      width: 160px;
      height: 60px;
      text-indent: -9999px;
    }
    header ul {
    position:absolute;
    right:5vw;
    top:0;
    line-height:50px;
}
header li {
    display:inline;
    margin-right:4vw;    
}
header a {
    color:black;
    text-decoration: none;
}
header a:hover {
    text-decoration: underline;
}

.language-selector {
    display: flex;
    align-items: center;
    gap: 5px;
}

.language-selector label {
    font-size: 18px;
    cursor: pointer;
}

.language-selector select {
    padding: 5px;
    font-size: 14px;
}

nav ul {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
}

nav ul li {
    position: relative;
    padding: 10px 20px;
}

.dropdown-menu {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    background: rgba(255, 255, 255, 0.4);
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
    border-radius: 8px;
    width: 150px;
    text-align: left;
    padding: 5px 0;
  }

  .dropdown:hover .dropdown-menu {
    display: block;
  }
  
  .dropdown-menu li {
    padding: 8px 12px;
    font-size: 14px;
    transition: background 0.3s;
    cursor: pointer;
  }
  
  .dropdown-menu li:hover {
    background: #f0f0f0;
    }

    .container {
      max-width: 500px;
      margin: 120px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .container h2 {
      margin-top: 0;
      margin-bottom: 25px;
      color: #333;
    }

    label {
      display: block;
      text-align: left;
      margin-bottom: 10px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #ff7e9d;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #ff5e85;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #444;
    }

    
  </style>
</head>
<body>

  <!-- Header（不變動，樣式已美化） -->
  <header>
    <h1 id="title">食咩好</h1>
    <nav>
        <ul>
            <li><a href="home.html" id="home">首頁</a></li>
            <li><a href="ingredients.html" id="ingredients">食材</a></li>
            <li><a href="食譜.html" id="recipes">食譜</a></li>
            <li class="dropdown">
                <a href="#" id="tools">工具 ▼</a>
                <ul class="dropdown-menu">
                    <li><a href="bmi.html" id="tool1">BMI</a></li>
                    <li><a href="tdee.html" id="tool2">TDEE</a></li>
                    <li><a href="timetable.html" id="tool3">TIMETABLE</a></li>
                </ul>
            </li>
            <li>
                <div class="language-selector">
                    <label for="language">🌐</label>
                    <select id="language"onchange="changeLanguage()">
                        <option value="zh">中文</option>
                        <option value="en">English</option>
                    </select>
                </div>
            </li>
        </ul>
    </nav>
</header>


  <!-- 主內容 -->
  <div class="container">
    <h2 id="tool-title">TDEE 計算器</h2>

    <label id="age-label">年齡:</label>
    <input type="number" id="age" min="1" required>

    <label id="gender-label">性別:</label>
    <select id="gender">
      <option value="male" id="gender-male">男性</option>
      <option value="female" id="gender-female">女性</option>
    </select>

    <label id="height-label">身高 (cm):</label>
    <input type="number" id="height" min="1" required>

    <label id="weight-label">體重 (kg):</label>
    <input type="number" id="weight" min="1" required>

    <label id="activity-label">活動水平:</label>
    <select id="activity">
      <option value="1.2" id="act0">久坐不動</option>
      <option value="1.375" id="act1">輕量活動 (1-3 天/週)</option>
      <option value="1.55" id="act2">中等活動 (3-5 天/週)</option>
      <option value="1.725" id="act3">高強度活動 (6-7 天/週)</option>
      <option value="1.9" id="act4">極高強度 (運動員)</option>
    </select>

    <button onclick="calculateTDEE()" id="calculate-btn">計算 TDEE</button>
    <div class="result" id="tdeeResult"></div>
  </div>

  <script>
    const translations = {
      zh: {
        title: "食咩好",
        home: "首頁",
        ingredients: "食材",
        recipes: "食譜",
        tools: "工具",
        toolTitle: "TDEE 計算器",
        ageLabel: "年齡:",
        genderLabel: "性別:",
        heightLabel: "身高 (cm):",
        weightLabel: "體重 (kg):",
        activityLabel: "活動水平:",
        genderMale: "男性",
        genderFemale: "女性",
        activityOptions: [
          "久坐不動",
          "輕量活動 (1-3 天/週)",
          "中等活動 (3-5 天/週)",
          "高強度活動 (6-7 天/週)",
          "極高強度 (運動員)"
        ],
        calculateButton: "計算 TDEE",
        resultText: "您的 TDEE 是",
        alert: "請輸入有效的數字！"
      },
      en: {
        home: "Home",
        ingredients: "Ingredients",
        recipes: "Recipes",
        tools: "Tools",
        toolTitle: "TDEE Calculator",
        ageLabel: "Age:",
        genderLabel: "Gender:",
        heightLabel: "Height (cm):",
        weightLabel: "Weight (kg):",
        activityLabel: "Activity Level:",
        genderMale: "Male",
        genderFemale: "Female",
        activityOptions: [
          "Sedentary",
          "Light Activity (1–3 days/week)",
          "Moderate Activity (3–5 days/week)",
          "High Activity (6–7 days/week)",
          "Very High (Athlete)"
        ],
        calculateButton: "Calculate TDEE",
        resultText: "Your TDEE is",
        alert: "Please enter a valid number!"
      }
    };

    function changeLanguage() {
      const lang = document.getElementById("language").value;
      const t = translations[lang];
      document.getElementById("home").innerText = t.home;
      document.getElementById("ingredients").innerText = t.ingredients;
      document.getElementById("recipes").innerText = t.recipes;
      document.getElementById("tools").innerText = t.tools;
      document.getElementById("tool-title").innerText = t.toolTitle;
      document.getElementById("age-label").innerText = t.ageLabel;
      document.getElementById("gender-label").innerText = t.genderLabel;
      document.getElementById("height-label").innerText = t.heightLabel;
      document.getElementById("weight-label").innerText = t.weightLabel;
      document.getElementById("activity-label").innerText = t.activityLabel;
      document.getElementById("gender-male").textContent = t.genderMale;
      document.getElementById("gender-female").textContent = t.genderFemale;
      for (let i = 0; i < 5; i++) {
        document.getElementById(`act${i}`).textContent = t.activityOptions[i];
      }
      document.getElementById("calculate-btn").innerText = t.calculateButton;
    }

    function calculateTDEE() {
      let age = document.getElementById("age").value;
      let gender = document.getElementById("gender").value;
      let height = document.getElementById("height").value;
      let weight = document.getElementById("weight").value;
      let activity = document.getElementById("activity").value;
      let lang = document.getElementById("language").value;

      if (!age || !height || !weight || age <= 0 || height <= 0 || weight <= 0) {
        alert(translations[lang].alert);
        return;
      }

      let BMR;
      if (gender === "male") {
        BMR = 10 * weight + 6.25 * height - 5 * age + 5;
      } else {
        BMR = 10 * weight + 6.25 * height - 5 * age - 161;
      }

      let TDEE = Math.round(BMR * activity);
      document.getElementById("tdeeResult").innerText = `${translations[lang].resultText} ${TDEE} kcal`;
    }
  </script>

</body>
</html>
