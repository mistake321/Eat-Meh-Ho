        <style>
        /* 全局樣式 */

            font-family: 'Arial', sans-serif;

            color: #333;

        header {
            background-color: rgba(247, 245, 244, 0.9);
            height: 70px;
            width: 100%;
            position: fixed;
            display: flex;
            align-items: center;
            justify-content: space-between;

        h1 {
            color: white;
            background-image: url(F.png);

            background-position: center;
            background-size: contain;
            width: 200px;
            height: 80px;
            text-indent: -9999px;
        }

        nav {
            flex-grow: 1;
            text-align: right;
        }

        header ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: inline-flex;
            align-items: center;
        }

        header li {
            position: relative;
            margin-right: 30px;
        }

        header a {
            color: black;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        header a:hover {
            color: #485652;
        }

        /* Language selector styles */
        .language-selector {
            display: flex;
            align-items: center;
            gap: 5px;
			margin-left: auto;
        }

        .language-selector label {
            font-size: 15px;
            cursor: pointer;
        }

        .language-selector select {
            padding: 5px;
            font-size: 14px;
        }

        /* Dropdown menu styles */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            width: 150px;
            text-align: left;
            padding: 5px 0;
            z-index: 1;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }

        .dropdown-menu li {
            padding: 8px 12px;
            font-size: 14px;
            transition: background 0.3s;
            cursor: pointer;
        }
  
		.dropdown-menu li:hover {
			background: #f0f0f0;
		}

        /* 篩選區域 */
        .filter-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        .filter-group {
            margin-bottom: 20px;
        }
        .filter-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #666;
        }
        .filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .filter-options .option {
            flex: 1 1 150px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
		.filter-options .option span {
			display: block; /* 將中文和英文分開顯示 */
		}
        .filter-options .option:hover {
            background: #485652;
            color: white;
            border-color: #485652;
        }
        .filter-options .option.selected {
            background: #485652;
            color: white;
            border-color: #485652;
        }
		@media (max-width: 600px) {
			.filter-options .option {
				flex: 1 1 100%; /* 在小螢幕上每個選項佔滿整行 */
			}
		}
        .more-btn, .primary-btn {
            margin-top: 10px;
            background: #485652;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
        }
        .more-btn:hover, .primary-btn:hover {
            background: #3a4a4e;
        }
        /* 搜索框樣式 */
        .search-bar {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .search-bar input {
            width: 80%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }
        /* 食譜列表樣式 */
        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 250px));
			justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .recipe-item {
            flex: 0 1 calc(33.333% - 20px); /* Adjust to three items per row with space */
		}
        .recipe-item:hover {
            transform: scale(1.05);
        }
        .recipe-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px 8px 0 0;
            transition: transform 0.3s ease;
        }
        .recipe-item:hover .recipe-image {

        }

		.modal {

            top: 0;

            height: 100%;

	    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        window.onload = function() {
            const ingredient = getQueryParam('filter-options');
            if (ingredient) {
                const checkbox = document.querySelector(`input[value="${ingredient}"]`);
                if (checkbox) {
                    checkbox.checked = true;
                }
            }
        };
		window.onload = function() {
			const urlParams = new URLSearchParams(window.location.search);
			const ingredient = urlParams.get('filter-options');
			const autoFilter = urlParams.get('auto-filter');

			if (ingredient) {
				const checkbox = document.querySelector(`input[value="${ingredient}"]`);
				if (checkbox) {
					checkbox.checked = true;
				}
			}
    
			if (autoFilter) {
				document.getElementById("filterBtn").click(); // 自動觸發篩選按鈕
			}
		};
    </script>

        let selectedLanguage = 'zh'; // 預設為中文
		
		 // 設定語言選擇的事件監聽器
        document.getElementById("languageSelect").addEventListener("change", function() {
            selectedLanguage = this.value; // 更新選擇的語言
            loadRecipes(recipes); // 重新加載食譜以更新顯示的語言
        });

        // 為選項添加點擊事件
        document.querySelectorAll('.filter-options .option').forEach(option => {
            option.addEventListener('click', function() {
                const checkbox = this.querySelector('input');
                checkbox.checked = !checkbox.checked; // 切換選中狀態
                this.classList.toggle('selected', checkbox.checked); // 根據選中狀態添加或移除樣式
            });
        });

        // 篩選食譜
        document.getElementById("filterBtn").onclick = function() {
			const selectedIngredients = Array.from(document.querySelectorAll('#ingredientFilter input:checked')).map(input => input.value);
			const selectedCategories = Array.from(document.querySelectorAll('#categoryFilter input:checked')).map(input => input.value);
			const searchQuery = document.getElementById('searchInput').value.toLowerCase();
			const selectedGroups = Array.from(document.querySelectorAll('#groupFilter input:checked')).map(input => input.value);

			const filteredRecipes = recipes.filter(recipe => {
			const ingredientMatch = selectedIngredients.length === 0 || selectedIngredients.some(selectedIngredient => recipe.ingredients.some(ingredient => ingredient.name.includes(selectedIngredient)));
			const categoryMatch = selectedCategories.length === 0 || selectedCategories.some(category => recipe.category.includes(category));
			const groupMatch = selectedGroups.length === 0 || selectedGroups.some(group => recipe.group.includes(group)); // 使用 includes() 來檢查群組
			const searchMatch = recipe.name[selectedLanguage].toLowerCase().includes(searchQuery);

			return ingredientMatch && categoryMatch && groupMatch && searchMatch;
			});

			loadRecipes(filteredRecipes);
		};

        // 加載食譜列表
        function loadRecipes(recipeList) {
            const recipeGrid = document.getElementById("recipeGrid");
            recipeGrid.innerHTML = ''; // 清空現有的食譜列表
            recipeList.forEach(recipe => {
                const recipeItem = document.createElement("div");
                recipeItem.className = "recipe-item";
                recipeItem.innerHTML = `
                    <img src="${recipe.image}" alt="${recipe.name[selectedLanguage]}" class="recipe-image">
                    <div class="recipe-name">${recipe.name[selectedLanguage]}</div>
                    <div class="recipe-benefits">${recipe.benefits[selectedLanguage]}</div>
                `;
                recipeItem.onclick = () => openRecipeDetails(recipe); // 點擊時打開新視窗顯示食譜詳情
                recipeGrid.appendChild(recipeItem);
            });
        }

        // 打開食譜詳情的函數
        function openRecipeDetails(recipe) {
            const newWindow = window.open("", "_blank", "width=600,height=500");
            newWindow.document.write(`
                <!DOCTYPE html>
                <html lang="zh-Hant">
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>${recipe.name[selectedLanguage]}</title>
                    <style>
                        body {
                            font-family: 'Arial', sans-serif;
                            padding: 20px;
                            background: #f5f7fa;
                            color: #333;
                        }
                        h1 {
                            color: #485652;
                        }
                        .image-container {
                            display: flex;
                            justify-content: center;
                            margin: 20px 0;
                        }
                        .recipe-image {
                            max-width: 650px;
                            max-height: 800px;
                            object-fit: cover;
                            border-radius: 8px;
                        }
                        .recipe-details {
                            margin-top: 20px;
                        }
                        .ingredient-list {
                            display: flex;
                            justify-content: space-between;
                            margin: 5px 0;
                            padding: 5px 0;
                            border-bottom: 1px solid #ddd;
                        }
                        .recipe-steps {
                            margin-top: 10px;
                            padding: 10px;
                            background: #fff;
                            border-radius: 5px;
                            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
                        }
                    </style>
                </head>
                <body>
                    <h1>${recipe.name[selectedLanguage]}</h1>
                    <div class="image-container">
                        <img src="${recipe.image}" alt="${recipe.name[selectedLanguage]}" class="recipe-image">
                    </div>
                    <div class="recipe-details">
                        <h2>${selectedLanguage === 'zh' ? '食材' : 'Ingredients'}</h2>
                        ${recipe.ingredients.map(ingredient => `
                            <div class="ingredient-list">
                                <span>${ingredient.name}</span>
                                <span>${ingredient.amount}</span>
                            </div>
                        `).join('')}
                        <h2>${selectedLanguage === 'zh' ? '做法' : 'Instructions'}</h2>
                        <div class="recipe-steps">
                            <ol>
                                ${recipe.steps.map(step => `<li>${step[selectedLanguage]}</li>`).join('')}
                            </ol>
                        </div>
                        <h2>${selectedLanguage === 'zh' ? '健康益處' : 'Health Benefits'}</h2>
                        <p>${recipe.benefits[selectedLanguage]}</p>
                    </div>
                </body>
                </html>
            `);
            newWindow.document.close();
        }

        // 初始加載所有食譜
        loadRecipes(recipes);

        document.getElementById("moreIngredientBtn").onclick = function() {
            const moreIngredients = document.querySelectorAll(".more-ingredient");
            moreIngredients.forEach(ingredient => {
                ingredient.style.display = "block";
            });
            this.style.display = "none"; // 隱藏「更多」按鈕
        };

        document.getElementById("moreCategoryBtn").onclick = function() {
            const moreCategories = document.querySelectorAll(".more-category");
            moreCategories.forEach(category => {

            });

        };

		document.getElementById("moreGroupBtn").onclick = function() {
            const moreGroups = document.querySelectorAll(".more-group");
            moreGroups.forEach(group => {
                group.style.display = "block";
            });
            this.style.display = "none"; // 隱藏「更多」按鈕
        };
		
        // 重設篩選按鈕
        document.getElementById("resetBtn").onclick = function() {
            // 重設所有checkbox
            document.querySelectorAll('.filter-options input').forEach(input => {
                input.checked = false;
                input.parentElement.classList.remove('selected'); // 移除選中樣式
            });
            document.getElementById('searchInput').value = ''; // 清空搜尋框
            loadRecipes(recipes); // 重新加載所有食譜
        };
    </script>
